<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="ibex-tag.png">
<title>PNGP_Stambecchi</title>

<style>
body{font-family:system-ui;margin:10px;background:#f7f7f7;}
.panel{background:#e6e6e6;border-radius:12px;padding:10px;margin-bottom:10px;}
.controls{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}

select,button{font-size:1em;padding:4px 8px;border-radius:8px;border:1px solid #666;background:white;}

button.color{min-width:70px;border:2px solid #333;font-weight:bold;}
button.color.active{outline:3px solid black;}

table{width:100%;border-collapse:collapse;background:white;font-size:0.85em;}
th,td{padding:6px;border-bottom:1px solid #ccc;text-align:center;}
th{background:#ddd;position:sticky;top:0;}
.hidden{display:none;}

.selectWrap{
  display:inline-block;
  padding:3px;
  border-radius:10px;
  background:#e0a800;
}

#individSelect{
  border:none;
  background:white;
  font-weight:600;
  padding:8px 12px;
  border-radius:8px;
  font-size:0.9em;
}
</style>
</head>

<body>

<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">

  <img 
    src="ibex-tag.png" 
    alt="Ibex logo"
    style="height:60px;width:auto;"
  >

  <h1 id="tierart" style="margin:0;">
    PNGP_Stambecchi
  </h1>

</div>
  
<div class="panel">
  <h2 id="leftTitle">left ear marks</h2>
  <div class="controls">
    <select id="lNum"><option value="">Nr</option></select>
  </div>
  <div class="controls" id="lColors"></div>
</div>

<div class="panel">
  <h2 id="rightTitle">right ear marks</h2>
  <div class="controls">
    <select id="rNum"><option value="">Nr</option></select>
  </div>
  <div class="controls" id="rColors"></div>
</div>

<div class="panel">
<div class="selectWrap">
  <select id="individSelect">
    <option value="">select</option>
  </select>
</div>
<button id="resetBtn">reset</button>
</div>

<table>
<thead>
<tr>
<th>ID</th><th>Name</th><th>Sex</th><th>Age</th>
<th>L1</th><th>Nr</th><th>L2</th><th>Nr</th>
<th>R1</th><th>Nr</th><th>R2</th><th>Nr</th>
<th>Collar</th><th>Remark</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<script>
const CSV_FILE = "PNGP_Stambecchi.csv";

const LANG = {
  deutsch:{
    left:"Linke Markierung", right:"Rechte Markierung",
    reset:"Zurücksetzen", select:"Tier auswählen",
    Nr:"Nr",
    headers:["ID","Name","Sex","Alter","L1","Nr","L2","Nr","R1","Nr","R2","Nr","Halsband","Info"]
  },
  italiano:{
    left:"marcatura sinistra", right:"marcatura destra",
    reset:"reset", select:"scegli individuo",
    Nr:"Nr",
    headers:["ID","nome","sesso","età","S1","n°","S2","n°","D1","n°","D2","n°","collare","nota"]
  },
  vallader:{
    left:"entagls dretta", right:"entagls schnestra",
    reset:"reinizialiser", select:"individuum...",
    Nr:"Nr",
    headers:["ID","nom","schlatta","classa vegldüm","S1","nr","S2","nr","D1","nr","D2","nr","culer","remarcha"]
  },
  english:{
    left:"left ear marks", right:"right ear marks",
    reset:"reset", select:"select indiv",
    Nr:"Nr",
    headers:["ID","name","sex","age class","L1","no","L2","no","R1","no","R2","no","collar","remark"]
  }
};

function getColorFromName(name){
  if(!name)return"#ccc";
  let c=name.toLowerCase().trim();
  const dict = {
    weiss:"#edeae8",schwarz:"#5c5b5b",grau:"gray",rot:"#e86c56",blau:"#96d9e0",
    grün:"#cbf2c4",gelb:"#f7ed7e",orange:"#faa973",lila:"#f5d2fa",
    violett:"#f5d2fa",braun:"brown",rosa:"pink",rosarot:"deeppink",
    türkis:"turquoise",hellblau:"lightskyblue",dunkelblau:"darkblue",
    hellgrün:"lightgreen",dunkelgrün:"darkgreen",

    bianco:"#edeae8",nero:"#5c5b5b",grigio:"gray",rosso:"#e86c56",blu:"#96d9e0",
    verde:"#cbf2c4",giallo:"#f7ed7e",arancione:"#faa973",lilla:"#f4bbfc",
    viola:"#f5d2fa",marrone:"brown",turchese:"turquoise",
    bluchiaro:"lightskyblue",bluscuro:"darkblue",
    verdechiaro:"lightgreen",verdescuro:"darkgreen",

    white:"#edeae8",black:"#5c5b5b",gray:"gray",red:"#e86c56",blue:"#96d9e0",
    green:"#cbf2c4",yellow:"#f7ed7e",orange:"#faa973",purple:"#f5d2fa",
    violet:"#f5d2fa",brown:"brown",turquoise:"turquoise",
    lightskyblue:"lightskyblue",darkblue:"darkblue",
    lightgreen:"lightgreen",darkgreen:"darkgreen"
  };
  if (dict[c]) c = dict[c];
  const s = new Option().style;
  s.color = c;
  if (s.color !== "") return c;
  return "#ccc";
}

let UI_LANG="deutsch";
let data=[];
let selectedLColors=new Set();
let selectedRColors=new Set();

function detectSeparator(line){
  const counts={
    "\t":(line.match(/\t/g)||[]).length,
    ";":(line.match(/;/g)||[]).length,
    ",":(line.match(/,/g)||[]).length
  };
  return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
}

function parseCSV(text){
  text=text.replace(/\ufeff/g,"").replace(/\r/g,"").trim();
  const lines=text.split("\n");
  const sep=detectSeparator(lines[0]);
  const headersRaw=lines.shift().split(sep).map(h=>h.trim());
  UI_LANG=headersRaw[0].toLowerCase();
  const headers=headersRaw.slice(1);

  return lines.map(line=>{
    const vals=line.split(sep).map(v=>v.trim()).slice(1);
    let o={};
    headers.forEach((h,i)=>o[h]=vals[i]||"");
    return o;
  });
}

function applyLanguage(){
  const L=LANG[UI_LANG]||LANG.deutsch;
  rightTitle.textContent=L.right;
  leftTitle.textContent=L.left;
  resetBtn.textContent=L.reset;
  rNum.options[0].text = L.Nr;
  lNum.options[0].text = L.Nr;
  document.querySelectorAll("th").forEach((th,i)=>th.textContent=L.headers[i]);
  individSelect.options[0].text = L.select;
}

function unique(f){return[...new Set(data.map(d=>d[f]).filter(v=>v))];}

function buildDropdown(sel,vals){
  sel.innerHTML = `<option value="">Nr</option>`;

  vals
    .sort((a,b)=>String(a).localeCompare(String(b), undefined, {numeric:true}))
    .forEach(v=>{
      let o=document.createElement("option");
      o.value=v;
      o.textContent=v;
      sel.appendChild(o);
    });
}

function buildColors(container,colors,set){
  container.innerHTML="";
  colors.forEach(c=>{
    let b=document.createElement("button");
    b.textContent=c;
    b.className="color";
    b.style.background=getColorFromName(c);
    b.onclick=()=>{
      set.has(c)?set.delete(c):set.add(c);
      b.classList.toggle("active");
      applyFilters();
    };
    container.appendChild(b);
  });
}

function colorCellHTML(c){
  if(!c)return"";
  return `<span style="background:${getColorFromName(c)};padding:3px 6px;border-radius:6px;font-weight:bold;">${c.substring(0,3)}</span>`;
}

function updateVisibleColumns() {
  if (!data.length) return;

  const presentFields = new Set(Object.keys(data[0]));

  const columnMap = [
    "Individ_ID","Individ_Name","Sex","Age_Cohort",
    "Mark_L_1_color","Mark_L_1_Nr",
    "Mark_L_2_color","Mark_L_2_Nr",
    "Mark_R_1_color","Mark_R_1_Nr",
    "Mark_R_2_color","Mark_R_2_Nr",
    "collar","remark"
  ];

  document.querySelectorAll("thead th").forEach((th, i) => {
    const field = columnMap[i];
    th.style.display = presentFields.has(field) ? "" : "none";
  });
}

function render(rows){
  tableBody.innerHTML="";

  rows.forEach(d=>{
    const cells = [
      ["Individ_ID", d.Individ_ID],
      ["Individ_Name", d.Individ_Name],
      ["Sex", d.Sex],
      ["Age_Cohort", d.Age_Cohort],
      ["Mark_L_1_color", colorCellHTML(d.Mark_L_1_color)],
      ["Mark_L_1_Nr", d.Mark_L_1_Nr],
      ["Mark_L_2_color", colorCellHTML(d.Mark_L_2_color)],
      ["Mark_L_2_Nr", d.Mark_L_2_Nr],
      ["Mark_R_1_color", colorCellHTML(d.Mark_R_1_color)],
      ["Mark_R_1_Nr", d.Mark_R_1_Nr],
      ["Mark_R_2_color", colorCellHTML(d.Mark_R_2_color)],
      ["Mark_R_2_Nr", d.Mark_R_2_Nr],
      ["collar", d.collar],
      ["remark", d.remark]
    ];

    let rowHTML = "<tr>";
    cells.forEach(([key, val])=>{
      if (key in d) rowHTML += `<td>${val ?? ""}</td>`;
    });
    rowHTML += "</tr>";

    tableBody.insertAdjacentHTML("beforeend", rowHTML);
  });
}

function applyFilters(){
  render(data.filter(d=>{

    if (lNum.value) {
      const lNums = [d.Mark_L_1_Nr, d.Mark_L_2_Nr];
      if (!lNums.includes(lNum.value)) return false;
    }

    if (rNum.value) {
      const rNums = [d.Mark_R_1_Nr, d.Mark_R_2_Nr];
      if (!rNums.includes(rNum.value)) return false;
    }

    if(selectedLColors.size){
      const lc=[d.Mark_L_1_color,d.Mark_L_2_color];
      if(![...selectedLColors].every(c=>lc.includes(c)))return false;
    }

    if(selectedRColors.size){
      const rc=[d.Mark_R_1_color,d.Mark_R_2_color];
      if(![...selectedRColors].every(c=>rc.includes(c)))return false;
    }

    return true;
  }));
}

resetBtn.onclick=()=>{
  selectedLColors.clear();
  selectedRColors.clear();
  rNum.value = "";
  lNum.value = "";
  individSelect.value = "";
  document.querySelectorAll(".color").forEach(b=>b.classList.remove("active"));
  render(data);
};

const individSelect = document.getElementById("individSelect");

function buildIndividDropdown(){
  individSelect.innerHTML = `<option value=""></option>`;
  const seen = new Set();

  data.forEach(d=>{
    const key = d.Individ_ID + " " + d.Individ_Name;
    if(seen.has(key)) return;
    seen.add(key);

    const o = document.createElement("option");
    o.value = d.Individ_ID;
    o.textContent = key;
    individSelect.appendChild(o);
  });
}

individSelect.onchange = ()=>{
  if(!individSelect.value){
    applyFilters();
    return;
  }
  render(data.filter(d => d.Individ_ID === individSelect.value));
};

rNum.onchange = lNum.onchange = applyFilters;

async function loadCSVAutomatically() {
  try {
    const response = await fetch(CSV_FILE);
    const csvText = await response.text();

    data = parseCSV(csvText);

    updateVisibleColumns();
    applyLanguage();

    buildDropdown(lNum, [
      ...new Set([
        ...unique("Mark_L_1_Nr"),
        ...unique("Mark_L_2_Nr")
      ])
    ]);

    buildDropdown(rNum, [
      ...new Set([
        ...unique("Mark_R_1_Nr"),
        ...unique("Mark_R_2_Nr")
      ])
    ]);

    buildColors(
      lColors,
      [...new Set([...unique("Mark_L_1_color"),...unique("Mark_L_2_color")])],
      selectedLColors
    );

    buildColors(
      rColors,
      [...new Set([...unique("Mark_R_1_color"),...unique("Mark_R_2_color")])],
      selectedRColors
    );

    render(data);
    buildIndividDropdown();
    applyLanguage();

  } catch (err) {
    console.error("Error loading CSV:", err);
    alert("Could not load PNGP_Stambecchi.csv");
  }
}

loadCSVAutomatically();
</script>

</body>
</html>
